spring:
  application:
    name: cv-analyzer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cvanalyzer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openapi-key}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:b7f4c9e2a1d84f6bb2c7e91a5d3f8c6ab9e4d1f7c2a8e5b6d9f3a1c7e4b8f2d}
    expiration: 86400000   

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: cv-files

  github:
    token: ${GITHUB_TOKEN:}

server:
  port: 8080

